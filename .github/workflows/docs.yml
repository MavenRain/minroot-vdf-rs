name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache cargo registry, index, and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings --enable-index-page -Z unstable-options
        run: cargo doc --no-deps --document-private-items --workspace

      - name: Copy index redirect
        run: |
          cat > target/doc/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>Redirecting to minroot_core</title>
          <meta http-equiv="refresh" content="0; url=minroot_core/index.html">
          <link rel="canonical" href="minroot_core/index.html">
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
